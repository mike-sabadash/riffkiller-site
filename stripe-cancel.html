<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Riff Killer - Checkout Cancelled</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Zen+Dots&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <style>
        body { background-color: #111629; color: #fff; font-family: 'Roboto', sans-serif; min-height: 100vh;
        min-height: 100dvh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; text-align: center; }
        .cancel-box { max-width: 420px; padding: 40px; background: rgba(255,255,255,0.03); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .cancel-box h1 { font-family: 'Zen Dots', cursive; font-size: 24px; font-weight: 400; margin-bottom: 12px; }
        .cancel-box p { color: rgba(255,255,255,0.7); margin-bottom: 24px; }
        .cancel-box a { display: inline-block; padding: 12px 24px; background: #9355E5; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 500; transition: background 0.2s; margin: 0 8px 8px 0; }
        .cancel-box a:hover { background: #7B3FC7; }
        .cancel-box a.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.3); }
        .cancel-box a.secondary:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="cancel-box">
        <h1>Checkout cancelled</h1>
        <p>No charge was made. You can try again whenever you're ready.</p>
        <a href="billing.html">Back to billing</a>
        <a href="profile.html" class="secondary">Back to profile</a>
    </div>
</body>
</html>
